[build]
  command = "npm run build"
  publish = ".next"

[functions]
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin"
  status = 200

# Important: laisser Netlify Identity gérer ses propres routes
# Ne pas rediriger /.netlify/identity/*

# Rediriger les tokens d'invitation vers /admin
[[redirects]]
  from = "/*"
  to = "/admin"
  status = 200
  force = true
  conditions = { Query = { invite_token = [".*"] } }
