[build]
  command = "npm run build"
  publish = ".next"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Headers de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirection Netlify CMS
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# ⚠️ IMPORTANT : Les routes CMS (Next.js API) doivent passer AVANT les fonctions Netlify
# Les routes /api/cms/* ne sont PAS redirigées
[[redirects]]
  from = "/api/cms/*"
  to = "/api/cms/:splat"
  status = 200
  force = false

# Redirection des fonctions API Netlify (seulement pour les fonctions)
[[redirects]]
  from = "/api/submit-order"
  to = "/.netlify/functions/submit-order"
  status = 200

[[redirects]]
  from = "/api/submit-testimonial"
  to = "/.netlify/functions/submit-testimonial"
  status = 200

[[redirects]]
  from = "/api/get-orders"
  to = "/.netlify/functions/get-orders"
  status = 200

[[redirects]]
  from = "/api/get-testimonials"
  to = "/.netlify/functions/get-testimonials"
  status = 200

[[redirects]]
  from = "/api/get-all-testimonials"
  to = "/.netlify/functions/get-all-testimonials"
  status = 200

[[redirects]]
  from = "/api/moderate-testimonial"
  to = "/.netlify/functions/moderate-testimonial"
  status = 200

[[redirects]]
  from = "/api/update-order-status"
  to = "/.netlify/functions/update-order-status"
  status = 200

[[redirects]]
  from = "/api/get-photo"
  to = "/.netlify/functions/get-photo"
  status = 200