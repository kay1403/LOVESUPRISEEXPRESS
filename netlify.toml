[build]
  command = "npm run build"
  publish = ".next"

[functions]
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Netlify CMS - servira le fichier index.html de public/admin
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Dashboard React - ne pas rediriger, laisser Next.js gérer
