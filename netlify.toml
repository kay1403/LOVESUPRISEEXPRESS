# netlify.toml - Configuration pour LoveExpress (Next.js)

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# Configuration des redirections pour Next.js (SSR + API routes)
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
  force = true

# Redirection des assets statiques
[[redirects]]
  from = "/_next/static/*"
  to = "/_next/static/:splat"
  status = 200

# Redirection de toutes les autres routes vers Next.js
[[redirects]]
  from = "/*"
  to = "/"
  status = 200
  force = false

# Headers de sécurité et performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache pour les assets statiques (1 an)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache pour les images (1 semaine)
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Plugin Next.js officiel Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Fonctions Netlify (pour les API routes)
[functions]
  node_bundler = "esbuild"
  directory = ".next/server/app/api"

# Framework preset
[context.production]
  command = "npm run build"
  publish = ".next"

[context.deploy-preview]
  command = "npm run build"
  publish = ".next"

[context.branch-deploy]
  command = "npm run build"
  publish = ".next"
