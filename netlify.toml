[build]
  command = "npm run build"
  publish = ".next"

[functions]
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin"
  status = 200

# Redirection pour Netlify Identity callback
[[redirects]]
  from = "/.netlify/identity/*"
  to = "/admin"
  status = 200

# Redirection de confirmation d'invitation
[[redirects]]
  from = "/#invite_token_*"
  to = "/admin"
  status = 200
