backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"
public_path: "/images/uploads"

collections:
  - name: "services"
    label: "🎈 Services"
    folder: "content/services"
    create: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    fields:
      - { label: "ID", name: "id", widget: "number", default: 1 }
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Sous-titre", name: "subtitle", widget: "string" }
      - { label: "Badge", name: "badge", widget: "string" }
      - { label: "Description courte", name: "description", widget: "text" }
      - { label: "Description longue", name: "longDescription", widget: "text" }
      - { label: "Prix départ", name: "basePrice", widget: "number" }
      - { label: "Prix affiché", name: "priceRange", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Durée", name: "duration", widget: "string" }
      - { label: "Couverture", name: "coverage", widget: "string" }
      - label: "Packs"
        name: "packs"
        widget: "list"
        required: false
        fields:
          - { label: "Nom", name: "name", widget: "string" }
          - { label: "Prix", name: "price", widget: "number" }
          - { label: "Description", name: "desc", widget: "text" }
      - label: "Inclus"
        name: "includes"
        widget: "list"
        field: { label: "Item", name: "item", widget: "string" }
      - label: "Options"
        name: "options"
        widget: "list"
        required: false
        fields:
          - { label: "Nom", name: "name", widget: "string" }
          - { label: "Prix", name: "price", widget: "number" }
          - { label: "Note", name: "note", widget: "string", required: false }

  - name: "gift_baskets"
    label: "🎁 Paniers cadeaux"
    folder: "content/gift_baskets"
    create: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    fields:
      - { label: "ID", name: "id", widget: "number" }
      - { label: "Nom", name: "name", widget: "string" }
      - { label: "Sous-titre", name: "subtitle", widget: "string" }
      - { label: "Badge", name: "badge", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Description longue", name: "longDescription", widget: "text" }
      - { label: "Prix standard", name: "priceStandard", widget: "number" }
      - { label: "Prix premium", name: "pricePremium", widget: "number" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Populaire", name: "popular", widget: "boolean", default: false }
      - label: "Contenu"
        name: "includes"
        widget: "list"
        field: { label: "Item", name: "item", widget: "string" }

  - name: "realisations"
    label: "📸 Réalisations"
    folder: "content/realisations"
    create: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    fields:
      - { label: "ID", name: "id", widget: "number" }
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Catégorie", name: "category", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }

  - name: "hero_slides"
    label: "🎬 Hero Slides"
    folder: "content/hero_slides"
    create: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    fields:
      - { label: "ID", name: "id", widget: "number" }
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Sous-titre", name: "subtitle", widget: "string" }
      - { label: "Badge", name: "badge", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image" }
      - label: "Caractéristiques"
        name: "features"
        widget: "list"
        required: true
        default: ["Fleurs fraîches de saison", "Emballage élégant", "Carte personnalisée", "Livraison offerte à Kigali"]
        field: { label: "Feature", name: "feature", widget: "string" }
      - { label: "Couleur de fond", name: "bgColor", widget: "string", default: "#FF4D6D", required: false }
      - { label: "Couleur claire", name: "bgLight", widget: "string", default: "#FFF0F3", required: false }
      - { label: "Position", name: "order", widget: "number", default: 0 }

  - name: "footer"
    label: "📋 Footer"
    folder: "content/footer"
    create: true
    slug: "config"
    format: "json"
    extension: "json"
    fields:
      - { label: "Nom entreprise", name: "companyName", widget: "string", default: "LoveExpress" }
      - { label: "Slogan", name: "slogan", widget: "text", default: "We deliver love and kindness. Créons ensemble des moments inoubliables." }
      - { label: "Téléphone 1", name: "phone1", widget: "string", default: "+250 799 366 007" }
      - { label: "Téléphone 2", name: "phone2", widget: "string", default: "+250 737 769 092" }
      - { label: "Adresse", name: "address", widget: "string", default: "Kigali, Rwanda" }
      - label: "Horaires"
        name: "hours"
        widget: "list"
        fields:
          - { label: "Jour", name: "day", widget: "string" }
          - { label: "Horaires", name: "time", widget: "string" }
      - label: "Services liste"
        name: "services"
        widget: "list"
        default: ["Party Decoration", "Surprise Planner", "Flower Bouquet", "Gift Baskets"]
        field: { label: "Service", name: "service", widget: "string" }
      - { label: "Copyright", name: "copyright", widget: "string", default: "Tous droits réservés" }
      - { label: "Année", name: "year", widget: "number", valueType: "int", required: false }
